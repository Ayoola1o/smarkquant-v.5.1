<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="textGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Letter S -->
  <text x="60" y="140" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="url(#textGradient2)" text-anchor="middle">S</text>
  
  <!-- Letter M -->
  <text x="140" y="140" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="url(#textGradient2)" text-anchor="middle">M</text>
</svg>