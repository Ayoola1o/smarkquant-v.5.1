version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: jesse_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jesse_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - quant_net

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - quant_net

  backend:
    build: ./backend
    container_name: quant_backend
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=jesse_user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=jesse_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
    networks:
      - quant_net
    # Keep container running for development
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

networks:
  quant_net:
    driver: bridge

volumes:
  postgres_data:
